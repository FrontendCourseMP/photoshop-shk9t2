<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GrayBit-7 Image Lab</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header>
    <h1>GrayBit-7 Image Lab</h1>
  </header>
  <main>
    <section class="controls">
      <input id="fileInput" type="file" accept=".gb7,image/png,image/jpeg" />
      <button id="downloadPNG">Download PNG</button>
      <button id="downloadJPG">Download JPG</button>
      <button id="downloadGB7">Download GB7</button>
      <button id="btnPipette">Пипетка</button>
      <button id="btnLevels">Уровни</button>
      <button id="btnFilters">Фильтры</button>
      <label class="scale-control">Масштаб: <input id="scaleRange" type="range" min="12" max="300" value="100"><span id="scaleVal">100%</span></label>
      <button id="btnScale">Масштабировать</button>
      <select id="preset">
        <option value="gradient">Gradient</option>
        <option value="checker">Checker</option>
        <option value="masked">Masked circle</option>
      </select>
      <button id="generateBtn">Generate Test Image</button>
    </section>

    <section class="workspace">
      <aside id="channelPanel" class="channel-panel">
        <h3>Каналы</h3>
        <div class="channel-item"><canvas id="previewGray" width="128" height="128"></canvas><label><input type="checkbox" data-channel="gray"> Gray (обзор)</label></div>
        <div class="channel-item"><canvas id="previewR" width="128" height="128"></canvas><label><input type="checkbox" data-channel="r" checked> R</label></div>
        <div class="channel-item"><canvas id="previewG" width="128" height="128"></canvas><label><input type="checkbox" data-channel="g" checked> G</label></div>
        <div class="channel-item"><canvas id="previewB" width="128" height="128"></canvas><label><input type="checkbox" data-channel="b" checked> B</label></div>
        <div class="channel-item"><canvas id="previewA" width="128" height="128"></canvas><label><input type="checkbox" data-channel="a" checked> Alpha</label></div>
      </aside>

      <section class="canvas-wrap">
        <canvas id="canvas"></canvas>
      </section>
    </section>

    <div id="pipetteInfo" class="pipette-info" style="display:none"></div>

    <dialog id="levelsDialog" class="levels-dialog">
      <div class="levels-header"><h2>Уровни</h2></div>
      <div class="levels-body">
        <div class="levels-top">
          <canvas id="histogramCanvas" width="512" height="140"></canvas>
          <div class="levels-controls">
            <label>Канал:
              <select id="levelsChannel">
                <option value="master">Master (RGB)</option>
                <option value="r">Red</option>
                <option value="g">Green</option>
                <option value="b">Blue</option>
                <option value="a">Alpha</option>
              </select>
            </label>
            <label><input type="checkbox" id="levelsLog"> Логарифмическая шкала</label>
            <label><input type="checkbox" id="levelsPreview" checked> Предпросмотр</label>
          </div>
        </div>

        <div class="levels-sliders">
          <label>Черный: <input id="levelBlack" type="range" min="0" max="255" value="0"><span id="levelBlackVal">0</span></label>
          <label>Гамма: <input id="levelGamma" type="range" min="0.1" max="9.9" step="0.01" value="1"><span id="levelGammaVal">1.00</span></label>
          <label>Белый: <input id="levelWhite" type="range" min="0" max="255" value="255"><span id="levelWhiteVal">255</span></label>
        </div>

        <div class="levels-actions">
          <button type="button" id="levelsReset">Сброс</button>
          <button type="button" id="levelsCancel">Отмена</button>
          <button type="button" id="levelsApply">Применить</button>
        </div>
      </div>
    </dialog>

    <dialog id="filtersDialog" class="filters-dialog">
      <h2>Фильтры (ядро 3×3)</h2>
      <div class="filters-body">
        <div class="filters-top">
          <label>Преднастройки:
            <select id="filterPreset">
              <option value="identity">Тождественное отображение</option>
              <option value="sharpen">Повышение резкости</option>
              <option value="gaussian">Фильтр Гаусса (3×3)</option>
              <option value="box">Прямоугольное размытие</option>
              <option value="prewitt_x">Оператор Прюитта (X)</option>
              <option value="prewitt_y">Оператор Прюитта (Y)</option>
            </select>
          </label>
          <label class="filters-preview"><input type="checkbox" id="filtersPreview" checked> Предпросмотр</label>
        </div>

        <div class="kernel-grid">
          <input class="kernel-input" data-idx="0" type="number" step="any" value="0">
          <input class="kernel-input" data-idx="1" type="number" step="any" value="0">
          <input class="kernel-input" data-idx="2" type="number" step="any" value="0">
          <input class="kernel-input" data-idx="3" type="number" step="any" value="0">
          <input class="kernel-input" data-idx="4" type="number" step="any" value="1">
          <input class="kernel-input" data-idx="5" type="number" step="any" value="0">
          <input class="kernel-input" data-idx="6" type="number" step="any" value="0">
          <input class="kernel-input" data-idx="7" type="number" step="any" value="0">
          <input class="kernel-input" data-idx="8" type="number" step="any" value="0">
        </div>

        <div class="filters-options">
          <div class="filters-channels">
            <label><input type="checkbox" id="filterR" checked> R</label>
            <label><input type="checkbox" id="filterG" checked> G</label>
            <label><input type="checkbox" id="filterB" checked> B</label>
            <label><input type="checkbox" id="filterA"> Alpha</label>
            <button type="button" id="filterSelectAll">Все</button>
          </div>
          <div class="filters-edge">
            <label>Заполнение края:</label>
            <label><input type="radio" name="edgeMode" value="copy" checked> Копировать</label>
            <label><input type="radio" name="edgeMode" value="black"> Черный</label>
            <label><input type="radio" name="edgeMode" value="white"> Белый</label>
          </div>
        </div>

        <div class="filters-actions">
          <button id="filtersReset" type="button">Сброс</button>
          <button id="filtersCancel" type="button">Закрыть</button>
          <button id="filtersApply" type="button">Применить</button>
        </div>

        <div class="filters-note">Примечание: ядро нормализуется по сумме коэффициентов, если сумма ≠ 0.</div>
      </div>
    </dialog>

    <dialog id="scaleDialog" class="scale-dialog">
      <h2>Изменение размера (масштаб)</h2>
      <div class="scale-body">
        <div class="scale-info">Исходный размер: <span id="origSize">-</span> — <span id="origMP">-</span> Мп</div>
        <div class="scale-mode">
          <label><input type="radio" name="scaleMode" value="percent" checked> В процентах</label>
          <label><input type="radio" name="scaleMode" value="pixels"> В пикселях</label>
        </div>
        <div class="scale-inputs">
          <label>Ширина: <input id="scaleWidth" type="number" min="1"></label>
          <label>Высота: <input id="scaleHeight" type="number" min="1"></label>
          <label><input id="keepAspect" type="checkbox" checked> Сохранить пропорции</label>
        </div>
        <div class="scale-algo">
          <label>Алгоритм: <select id="scaleAlgo"><option value="bilinear">Билинейный</option><option value="nearest">Ближайший сосед</option></select></label>
          <span class="tooltip" title="Билинейная интерполяция даёт более плавный результат; ближайший сосед быстрее и сохраняет резкие пиксели">?</span>
        </div>
        <div class="scale-actions">
          <button id="scaleReset">Сброс</button>
          <button id="scaleCancel">Отмена</button>
          <button id="scaleApply">Применить</button>
        </div>
      </div>
    </dialog>
  </main>
  <footer id="statusBar">Ready</footer>

  <script src="js/gb7.js"></script>
  <script src="js/app.js"></script>
  <script src="js/filters.js"></script>
</body>
</html>
